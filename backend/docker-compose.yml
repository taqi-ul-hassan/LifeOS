services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://lifeos:lifeos@postgres:5432/lifeos
      JWT_SECRET: ${JWT_SECRET:?Set a strong JWT_SECRET in .env}
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: lifeos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos -d lifeos"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes: [postgres_data:/var/lib/postgresql/data]
volumes:
  postgres_data:
